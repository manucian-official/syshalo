version: 2
updates:
  # Maintain dependency updates for npm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    
    # Bundle minor/patch upgrades to avoid PR spam
    groups:
      ecosystem-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@google/genai" # Keep Gemini updates atomic
          - "react"         # Keep core UI updates atomic
          - "react-dom"

  # Keep GitHub Actions up-to-date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
