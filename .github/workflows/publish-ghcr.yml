name: 🐳 Publish Docker Container to GHCR

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*' # Trigger on version releases e.g., v1.0.0
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  # GitHub repository path in lowercase format
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: 🛡️ Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry (GHCR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata (Tags, Labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: 🚀 Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ id.meta.outputs.tags || (steps.meta.outputs.tags) }}
          labels: ${{ id.meta.outputs.labels || (steps.meta.outputs.labels) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
